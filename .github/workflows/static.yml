name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mirror brochure → inzori-web-deploy + repo-root tests/ (qc_gaps, photochem, manifest).
      - name: Sync brochure → deploy + tests/
        run: ./web/pack_for_github_pages.sh

      # pack overwrites tests/qc_gaps* and tests/photochem* with brochure copies (no hub nav).
      # Reinject static Home/Tests + QC/PFΔ peer rows before assembling _site.
      - name: Inject static nav into test HTML
        run: python3 tests/_tools_inject_static_nav.py

      # Do NOT publish web/inzori-web-deploy alone: brochure/tests/ is a subset of
      # repo-root tests/ — manifest links would 404. Ship landing HTML + full tests/.
      - name: Assemble site (_site)
        run: |
          set -euo pipefail
          mkdir -p _site
          for f in index.html tests.html de.html fr.html ro.html; do
            if [[ -f "$f" ]]; then cp -a "$f" "_site/$f"; fi
          done
          rsync -a tests/ _site/tests/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
